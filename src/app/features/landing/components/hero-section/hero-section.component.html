<section id="inicio" class="hero" aria-labelledby="hero-title">
  <div class="hero__container">
    <div class="hero__content">
      <h1 id="hero-title" class="hero__title">
        {{ headline }}
      </h1>
      <p class="hero__subtitle">
        {{ subtitle }}
      </p>
      <div class="hero__actions">
        <app-cta-button
          text="Solicitar asesoría"
          variant="primary"
          size="lg"
          (clicked)="onRequestDemo()"
        />
        <app-cta-button
          text="Ver servicios"
          variant="outline"
          size="lg"
          (clicked)="onViewServices()"
        />
      </div>
    </div>

    <div class="hero__visual" aria-hidden="true">
      <!-- SVG Illustration representing AI/Automation -->
      <svg class="hero__illustration" viewBox="0 0 500 400" fill="none" xmlns="http://www.w3.org/2000/svg">
        <!-- Background circles -->
        <circle cx="250" cy="200" r="150" fill="url(#grad1)" opacity="0.1"/>
        <circle cx="250" cy="200" r="100" fill="url(#grad1)" opacity="0.15"/>
        <circle cx="250" cy="200" r="50" fill="url(#grad1)" opacity="0.2"/>
        
        <!-- Central AI Brain Icon -->
        <g transform="translate(200, 150)">
          <!-- Brain outline -->
          <path d="M50 0C22.4 0 0 22.4 0 50s22.4 50 50 50 50-22.4 50-50S77.6 0 50 0z" fill="url(#grad2)" opacity="0.9"/>
          <!-- Circuit lines -->
          <path d="M25 50h50M50 25v50M35 35l30 30M65 35L35 65" stroke="#ffffff" stroke-width="2" stroke-linecap="round" opacity="0.8"/>
          <!-- Center dot -->
          <circle cx="50" cy="50" r="8" fill="#ffffff"/>
        </g>

        <!-- Orbiting nodes -->
        <g class="hero__nodes">
          <!-- Node 1 - Top -->
          <circle cx="250" cy="80" r="12" fill="#a855f7">
            <animate attributeName="opacity" values="1;0.5;1" dur="2s" repeatCount="indefinite"/>
          </circle>
          <line x1="250" y1="92" x2="250" y2="150" stroke="#a855f7" stroke-width="2" stroke-dasharray="4,4">
            <animate attributeName="stroke-dashoffset" values="0;8" dur="1s" repeatCount="indefinite"/>
          </line>

          <!-- Node 2 - Right -->
          <circle cx="380" cy="200" r="12" fill="#3b82f6">
            <animate attributeName="opacity" values="0.5;1;0.5" dur="2s" repeatCount="indefinite"/>
          </circle>
          <line x1="368" y1="200" x2="300" y2="200" stroke="#3b82f6" stroke-width="2" stroke-dasharray="4,4">
            <animate attributeName="stroke-dashoffset" values="0;8" dur="1s" repeatCount="indefinite"/>
          </line>

          <!-- Node 3 - Bottom -->
          <circle cx="250" cy="320" r="12" fill="#a855f7">
            <animate attributeName="opacity" values="1;0.5;1" dur="2s" repeatCount="indefinite" begin="0.5s"/>
          </circle>
          <line x1="250" y1="308" x2="250" y2="250" stroke="#a855f7" stroke-width="2" stroke-dasharray="4,4">
            <animate attributeName="stroke-dashoffset" values="0;8" dur="1s" repeatCount="indefinite"/>
          </line>

          <!-- Node 4 - Left -->
          <circle cx="120" cy="200" r="12" fill="#3b82f6">
            <animate attributeName="opacity" values="0.5;1;0.5" dur="2s" repeatCount="indefinite" begin="0.5s"/>
          </circle>
          <line x1="132" y1="200" x2="200" y2="200" stroke="#3b82f6" stroke-width="2" stroke-dasharray="4,4">
            <animate attributeName="stroke-dashoffset" values="0;8" dur="1s" repeatCount="indefinite"/>
          </line>
        </g>

        <!-- Floating elements -->
        <g class="hero__floating">
          <!-- Code bracket -->
          <text x="100" y="120" fill="#a855f7" font-size="24" font-family="monospace" opacity="0.7">{{ '{' }}</text>
          <!-- Gear -->
          <text x="380" y="100" fill="#3b82f6" font-size="20" opacity="0.7">⚙️</text>
          <!-- Lightning -->
          <text x="400" y="300" fill="#a855f7" font-size="20" opacity="0.7">⚡</text>
          <!-- Chart -->
          <text x="90" y="280" fill="#3b82f6" font-size="20" opacity="0.7">📊</text>
        </g>

        <!-- Gradients -->
        <defs>
          <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#6b21a8"/>
            <stop offset="100%" style="stop-color:#3b82f6"/>
          </linearGradient>
          <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#a855f7"/>
            <stop offset="100%" style="stop-color:#3b82f6"/>
          </linearGradient>
        </defs>
      </svg>
    </div>
  </div>

  <!-- Scroll indicator -->
  <div class="hero__scroll-indicator" aria-hidden="true">
    <span class="hero__scroll-text">Scroll</span>
    <div class="hero__scroll-line"></div>
  </div>
</section>
